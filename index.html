<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grit Day Trading Platform</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
        color: #17211f;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.75), rgba(247, 243, 234, 0.96)),
          #f7f3ea;
      }

      main {
        width: min(860px, 100%);
      }

      .panel {
        padding: 28px;
        border: 1px solid #d8d1c3;
        border-radius: 8px;
        background: #ffffff;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 16px;
        color: #225f8f;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .eyebrow::before {
        width: 10px;
        height: 10px;
        content: "";
        background: #16784b;
        border: 2px solid #17211f;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 8vw, 64px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 18px 0 0;
        max-width: 720px;
        color: #50605b;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      a,
      button {
        min-height: 42px;
        padding: 0 14px;
        border: 1px solid #16784b;
        border-radius: 6px;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      a.primary,
      button.primary {
        color: #ffffff;
        background: #16784b;
      }

      a.secondary {
        display: inline-flex;
        align-items: center;
        color: #16784b;
        background: #ffffff;
      }

      .facts {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }

      .fact {
        min-height: 132px;
        padding: 16px;
        border: 1px solid #d8d1c3;
        border-radius: 8px;
        background: #ffffff;
      }

      .fact strong {
        display: block;
        margin-bottom: 8px;
        color: #17211f;
      }

      .fact span {
        color: #50605b;
        line-height: 1.6;
      }

      code {
        color: #b43d2b;
        font-family: Consolas, "Cascadia Mono", monospace;
        font-weight: 700;
      }

      @media (max-width: 720px) {
        body {
          place-items: start center;
        }

        .facts {
          grid-template-columns: 1fr;
        }

        a,
        button {
          width: 100%;
          justify-content: center;
        }
      }
    </style>
    <script>
      const localAppUrl = ["http:", "//", "127.0.0.1", ":5173", "/"].join("");

      if (window.location.protocol === "file:") {
        window.location.replace(localAppUrl);
      }

      window.addEventListener("DOMContentLoaded", () => {
        const localButton = document.querySelector("[data-local-app]");
        if (localButton) {
          localButton.addEventListener("click", () => {
            window.location.href = localAppUrl;
          });
        }
      });
    </script>
  </head>
  <body>
    <main>
      <section class="panel" aria-label="GitHub Pages 入口">
        <p class="eyebrow">GitHub Pages Preview</p>
        <h1>Grit Day Trading Platform</h1>
        <p>
          这是可公开访问的项目入口页。完整复盘台依赖本地后端、SQLite 数据和前端开发服务；
          GitHub Pages 只承载静态说明，不读取 STP 成交、行情归档或策略 run 数据。
        </p>
        <div class="actions">
          <button class="primary" type="button" data-local-app>打开本地复盘台</button>
          <a class="secondary" href="./README.md">查看 README</a>
        </div>
      </section>

      <section class="facts" aria-label="事实源边界">
        <article class="fact">
          <strong>P0 成交真相</strong>
          <span>STP TXT 和 committed fills 是订单与成交事实源。</span>
        </article>
        <article class="fact">
          <strong>P1 行情上下文</strong>
          <span>分钟线和 watchlist 只引用成交事实，不能覆盖成交。</span>
        </article>
        <article class="fact">
          <strong>P2 策略复盘</strong>
          <span>策略 run 只读取已归档分钟线，信号只做研究证据。</span>
        </article>
      </section>
    </main>
  </body>
</html>
